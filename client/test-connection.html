<!DOCTYPE html>
<html>
<head>
    <title>API 连接测试</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>API 连接测试</h1>
    <div id="result"></div>
    <script>
        const API_BASE_URL = 'https://pink-money-bag-serverless.onrender.com';
        const resultDiv = document.getElementById('result');

        async function testConnection() {
            try {
                resultDiv.innerHTML = '<p>正在测试连接...</p>';
                const response = await fetch(`${API_BASE_URL}/api/v1/health`);
                const data = await response.json();
                resultDiv.innerHTML = `
                    <h2>连接成功！</h2>
                    <p>状态码: ${response.status}</p>
                    <p>响应数据: ${JSON.stringify(data)}</p>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2>连接失败！</h2>
                    <p>错误: ${error.message}</p>
                `;
            }
        }

        testConnection();
    </script>
</body>
</html>
